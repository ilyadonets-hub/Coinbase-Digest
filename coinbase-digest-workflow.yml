# Copy this file to .github/workflows/coinbase-digest.yml in a GitHub repo.
# Add repo secrets: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, ANTHROPIC_API_KEY (optional).
name: Coinbase Weekly Digest to Telegram

on:
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC — adjust as needed
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python coinbase_weekly_to_telegram.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Persist last_seen.json back to the repo so the next run knows
      # which article was already sent.
      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json
          git diff --cached --quiet || git commit -m "Update last_seen state"
          git push
